site_name: Barrel DocDB
site_description: Embeddable document database for Erlang with MVCC, queries, and replication
site_url: https://barrel-db.gitlab.io/barrel_docdb
repo_url: https://gitlab.enki.io/barrel-db/barrel_docdb
repo_name: barrel-db/barrel_docdb
edit_uri: edit/main/

theme:
  name: material
  logo: assets/logo.png
  favicon: assets/favicon.png
  font:
    text: Roboto
    code: Roboto Mono
  palette:
    # Dark mode by default
    - media: "(prefers-color-scheme)"
      scheme: slate
      primary: custom
      accent: custom
      toggle:
        icon: material/brightness-auto
        name: Switch to light mode
    - media: "(prefers-color-scheme: light)"
      scheme: default
      primary: custom
      accent: custom
      toggle:
        icon: material/brightness-7
        name: Switch to dark mode
    - media: "(prefers-color-scheme: dark)"
      scheme: slate
      primary: custom
      accent: custom
      toggle:
        icon: material/brightness-4
        name: Switch to system preference
  features:
    - navigation.tabs
    - navigation.tabs.sticky
    - navigation.sections
    - navigation.expand
    - navigation.top
    - navigation.indexes
    - toc.integrate
    - search.suggest
    - search.highlight
    - content.code.copy
    - content.code.annotate
    - content.tabs.link
  icon:
    repo: fontawesome/brands/gitlab

extra_css:
  - stylesheets/extra.css

nav:
  - Home: index.md
  - Getting Started:
    - Quick Start: getting-started.md
    - Document Format: document-format.md
  - Guides:
    - Queries: queries.md
    - Changes Feed: changes.md
    - Replication: replication.md
    - Federation: federation.md
    - Tiered Storage: tiered-storage.md
    - Replication Policies: replication-policies.md
    - Metrics: metrics.md
  - HTTP API: api/http.md
  - Erlang API: api/erlang.md
  - Architecture: design.md
  - Development:
    - Contributing: development/contributing.md

markdown_extensions:
  - pymdownx.highlight:
      anchor_linenums: true
      line_spans: __span
      pygments_lang_class: true
  - pymdownx.inlinehilite
  - pymdownx.snippets
  - pymdownx.superfences:
      custom_fences:
        - name: mermaid
          class: mermaid
          format: !!python/name:pymdownx.superfences.fence_code_format
  - pymdownx.tabbed:
      alternate_style: true
  - pymdownx.details
  - pymdownx.emoji:
      emoji_index: !!python/name:material.extensions.emoji.twemoji
      emoji_generator: !!python/name:material.extensions.emoji.to_svg
  - admonition
  - tables
  - attr_list
  - md_in_html
  - def_list
  - toc:
      permalink: true

plugins:
  - search

extra:
  social:
    - icon: fontawesome/brands/gitlab
      link: https://gitlab.enki.io/barrel-db/barrel_docdb
  generator: false
